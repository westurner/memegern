<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient for the classic Advice Background -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#4ba7df" />
      <stop offset="60%" stop-color="#246fa6" />
      <stop offset="100%" stop-color="#0f3d61" />
    </radialGradient>

    <!-- Darker blue overlay for the alternating rays -->
    <linearGradient id="ray-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5a8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#082b47" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Penguin Shadows -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 1. MEME BACKGROUND WHEEL -->
  <rect width="500" height="500" fill="url(#bg-glow)" />
  <g fill="url(#ray-grad)">
    <polygon points="250,250 200,0 280,0" />
    <polygon points="250,250 390,0 460,40" />
    <polygon points="250,250 500,120 500,190" />
    <polygon points="250,250 500,280 500,350" />
    <polygon points="250,250 440,460 370,500" />
    <polygon points="250,250 280,500 200,500" />
    <polygon points="250,250 110,500 40,460" />
    <polygon points="250,250 0,350 0,280" />
    <polygon points="250,250 0,190 0,120" />
    <polygon points="250,250 40,40 110,0" />
  </g>

  <!-- 2. SOCIALLY AWKWARD PENGUIN (Facing Left) -->
  <g filter="url(#drop-shadow)" transform="translate(20, 15)">
    <!-- Rear Wing (Right side of body, pointing backwards) -->
    <path d="M 280,260 Q 330,280 340,320 Q 320,330 290,290 Z" fill="#232529" stroke="#141517" stroke-width="1.5" />

    <!-- Feet -->
    <!-- Left Foot -->
    <path d="M 215,385 Q 195,410 170,405 Q 185,380 210,380 Z" fill="#f7a028" stroke="#bd710b" stroke-width="1.5" />
    <!-- Right Foot -->
    <path d="M 255,385 Q 260,412 285,410 Q 280,380 255,380 Z" fill="#f7a028" stroke="#bd710b" stroke-width="1.5" />

    <!-- Main Body (Dark jacket) -->
    <path d="M 240,160 
             Q 290,165 305,210 
             Q 325,260 315,330 
             Q 300,390 240,390 
             Q 185,385 195,320 
             Q 200,260 215,200 
             Q 210,175 240,160 Z" 
          fill="#31353d" stroke="#1c1e24" stroke-width="2" />

    <!-- White Belly/Face Patch -->
    <path d="M 235,170 
             Q 275,175 285,210 
             Q 295,250 280,310 
             Q 265,380 230,380 
             Q 195,375 210,320 
             Q 220,270 215,220 
             Q 205,190 235,170 Z" 
          fill="#ffffff" />

    <!-- Awkwardly Side-Glancing Eye -->
    <g id="awkward-eye">
      <ellipse cx="230" cy="198" rx="7" ry="10" fill="#ffffff" stroke="#1c1e24" stroke-width="1.5" />
      <!-- Pupil looking hard to the left/backwards -->
      <ellipse cx="226" cy="198" rx="3.5" ry="5" fill="#1c1e24" />
      <!-- Eye Glint -->
      <circle cx="225" cy="195" r="1" fill="#ffffff" />
    </g>

    <!-- The Pointy Beak (Facing Left) -->
    <path d="M 218,205 Q 170,210 160,220 Q 200,230 222,218 Z" fill="#fca823" stroke="#d6840c" stroke-width="2" />
    <!-- Beak mouth line -->
    <path d="M 215,213 Q 180,216 163,220" fill="none" stroke="#b06702" stroke-width="1.5" />

    <!-- Front Wing (Left side, awkwardly gesturing backward/upward) -->
    <path d="M 205,250 Q 140,255 135,225 Q 155,205 195,230 Z" fill="#232529" stroke="#141517" stroke-width="2" />
  </g>
</svg>
